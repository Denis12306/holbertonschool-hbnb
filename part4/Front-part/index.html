<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <img src="../images/logo.png" class="logo" alt="Logo">
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" class="login-button">Login</a>
    </nav>
</header>

<main>

    <section>
        <h2>Available Places</h2>

        <label for="price-filter">Filter by max price: </label>
        <select id="price-filter">
          <option value="10">10</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="All" selected>All</option>
        </select>

        <div id="places-list">
        <div class="place-card" data-price="80">
            <h3>Cozy Apartment</h3>
            <p>Price: $80/night</p>
            <a href="place-cozy.html" class="details-button">View Details</a>
            <img src="../images/appartement.jpg" class="place-image" alt="Appartement">
            <img src="../images/facadeappart.jpg" class="place-image" alt="Appartement">
            <img src="../images/salonappart.jpg" class="place-image" alt="Appartement">
            <img src="../images/entree.jpg" class="place-image" alt="Appartement">
            <img src="../images/coinchill.jpg" class="place-image" alt="Appartement">
            <img src="../images/chambre2.jpg" class="place-image" alt="Appartement">
        </div>
        </div>

        <div id="places-list">
        <div class="place-card" data-price="250">
            <h3>Luxury Villa</h3>
            <p>Price: $250/night</p>
            <a href="place-villa.html" class="details-button">View Details</a>
            <img src="../images/cuisinevilla.jpg" class="place-image" alt="villa">
            <img src="../images/cuisinevilla2.jpg" class="place-image" alt="villa">
            <img src="../images/chambre.jpg" class="place-image" alt="villa">
            <img src="../images/villa.jpg" class="place-image" alt="villa">
            <img src="../images/salon.jpg" class="place-image" alt="villa">
            <img src="../images/sdbblanc.jpg" class="place-image" alt="villa">
        </div>
        </div>

        <div id="places-list">
        <div class="place-card" data-price="600">
            <h3>Castle of the unknown</h3>
            <p>Price: $600/night</p>
            <a href="place-castle.html" class="details-button">View Details</a>
            <img src="../images/chateau.jpg" class="place-image" alt="castle">
            <img src="../images/salonchateau.jpg" class="place-image" alt="castle">
            <img src="../images/couloir.jpg" class="place-image" alt="castle">
            <img src="../images/saloon.jpg" class="place-image" alt="castle">
            <img src="../images/sdb.jpg" class="place-image" alt="castle">
            <img src="../images/salonmaison.jpg" class="place-image" alt="castle">
        </div>
        </div>
    </section>

</main>

<footer>
    <p>All rights reserved HolbertonSchool 2026 Denis Gavaud</p>
</footer>

</body>
</html>
